<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockSage Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#050a12;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.07);--text:#c0cce0;--sub:#5a6a8a;--muted:#3a4a5a;--g:#00e678;--r:#ff3250;--y:#ffc828;--b:#00b4d8}
    *{box-sizing:border-box;font-family:'JetBrains Mono',monospace}
    body{margin:0;background:radial-gradient(circle at top,#0a1324,var(--bg));color:var(--text)}
    .app{max-width:480px;margin:0 auto;padding-bottom:88px}
    .header{position:sticky;top:0;z-index:30;background:rgba(5,10,18,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
    .logo{font-weight:800;letter-spacing:.5px}.live{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:1.5px}.dot{width:8px;height:8px;border-radius:50%;background:var(--g);box-shadow:0 0 10px var(--g)}
    .icon-btn,.mini-btn{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:6px 9px;cursor:pointer}
    .mini-btn{font-size:10px;letter-spacing:1.5px}
    .panel,.tabs-sub button,.pill,.grid div,.row,.position,.news,.metric,.inst-row,.risk,.history-item{background:var(--card);border:1px solid var(--border);border-radius:12px}
    .screen{padding:12px;display:none}.screen.active{display:block}
    .label{color:var(--sub);font-size:9px;letter-spacing:1.5px;text-transform:uppercase}
    input,button{font-size:13px} input{width:100%;background:#0b1422;border:1px solid var(--border);color:var(--text);padding:10px;border-radius:10px}
    .search{display:flex;gap:8px}.btn{border:none;border-radius:10px;padding:10px 12px;color:#021;cursor:pointer;font-weight:700;background:linear-gradient(90deg,var(--g),#79ffbd)}
    .chips{display:flex;gap:6px;overflow:auto;padding-top:8px}.pill{padding:6px 10px;font-size:10px;letter-spacing:1.5px;white-space:nowrap;cursor:pointer}
    .status{margin-top:10px;color:var(--b);font-size:11px;letter-spacing:1.2px}
    .hero{margin-top:12px;padding:12px}.hero h2{margin:0}.price{font-size:30px;font-weight:800}.chg.pos{color:var(--g)}.chg.neg{color:var(--r)}
    .badge{padding:5px 8px;border-radius:999px;font-size:10px;letter-spacing:1.5px;font-weight:700}
    .g{color:#041a10;background:linear-gradient(90deg,var(--g),#7efcc0)}.r{color:#23020a;background:linear-gradient(90deg,var(--r),#ff7b91)}.y{color:#2c1f00;background:linear-gradient(90deg,var(--y),#ffe083)}.b{color:#002631;background:linear-gradient(90deg,var(--b),#7ae9ff)}
    .score{display:flex;align-items:center;gap:8px;margin:10px 0}.segs{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;flex:1}.seg{height:8px;background:#1a2434;border-radius:4px}.seg.on.g{background:var(--g)}.seg.on.y{background:var(--y)}.seg.on.r{background:var(--r)}
    canvas{width:100%;height:70px;margin-top:8px}
    .tabs-sub{display:flex;gap:6px;overflow:auto;margin-top:10px}.tabs-sub button{padding:8px 9px;color:var(--sub);font-size:10px;letter-spacing:1.5px;cursor:pointer}.tabs-sub button.active{color:var(--text);border-color:var(--b)}
    .subpane{display:none;margin-top:10px}.subpane.active{display:block}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid div{padding:8px}
    .row,.metric,.news,.position,.inst-row,.risk{padding:9px;margin-bottom:8px}.row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}
    .range{height:10px;background:#111a2a;border-radius:999px;position:relative;overflow:hidden}.range .fill{height:100%;background:linear-gradient(90deg,var(--r),var(--y),var(--g))}.range .pin{position:absolute;top:-2px;width:2px;height:14px;background:#fff}
    .history-list{display:grid;gap:7px;margin-top:8px}.history-item{padding:8px;cursor:pointer}.history-item .top{display:flex;justify-content:space-between;gap:8px}
    .top-tools{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
    .bottom-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;max-width:480px;width:100%;display:flex;background:#091120;border-top:1px solid var(--border)}
    .bottom-nav button{flex:1;padding:12px;border:none;background:transparent;color:var(--sub);letter-spacing:1.5px;font-size:10px}.bottom-nav button.active{color:var(--text);background:var(--card)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:12px;z-index:50}.modal.active{display:flex}.modal-box{background:#091220;border:1px solid var(--border);border-radius:12px;padding:12px;width:100%;max-height:85vh;overflow:auto}
    .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .error{color:#ffd0d6;background:rgba(255,50,80,.12);border:1px solid rgba(255,50,80,.45);padding:8px;border-radius:10px;margin-top:8px;font-size:12px}
  </style>
</head>
<body>
<div class="app">
  <header class="header"><div><div class="logo">StockSage Pro</div><div class="live"><span class="dot"></span>LIVE</div></div><button class="icon-btn" onclick="openKeyModal()">🔑</button></header>
  <main>
    <section id="analyseScreen" class="screen active">
      <div class="panel" style="padding:10px">
        <div class="search"><input id="tickerInput" placeholder="ENTER TICKER / NAME"/><button class="btn" onclick="startAnalysis()">ANALYSE</button></div>
        <div class="top-tools"><button class="mini-btn" onclick="openHistoryModal()">HISTORY</button><button class="mini-btn" onclick="exportAnalysis()">EXPORT</button><button class="mini-btn" onclick="clearHistory()">CLEAR HISTORY</button></div>
        <div class="chips" id="chips"></div>
        <div id="status" class="status"></div><div id="error"></div>
      </div>
      <div id="heroWrap"></div>
      <div id="tabsWrap"></div>
    </section>
    <section id="portfolioScreen" class="screen">
      <div class="panel" style="padding:10px">
        <div class="label">Add Position</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px"><input id="pTicker" placeholder="TICKER"><input id="pQty" type="number" min="1" placeholder="QTY"><input id="pBuy" type="number" step="0.01" placeholder="BUY PRICE"><input id="pDate" type="date"></div>
        <button class="btn" style="margin-top:8px;width:100%" onclick="addPosition()">ADD TO PORTFOLIO</button>
      </div>
      <div id="portfolioList" style="margin-top:10px"></div>
    </section>
  </main>
</div>
<nav class="bottom-nav"><button id="tabAnalyse" class="active" onclick="switchTab('analyse')">ANALYSE</button><button id="tabPortfolio" onclick="switchTab('portfolio')">PORTFOLIO</button></nav>
<div id="keyModal" class="modal"><div class="modal-box"><div class="label">OpenAI API Key</div><input id="keyInput" placeholder="sk-..." style="margin-top:8px"/><div class="actions"><button class="icon-btn ghost" onclick="closeKeyModal()">CANCEL</button><button class="btn" onclick="saveKey()">SAVE</button></div></div></div>
<div id="historyModal" class="modal"><div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center"><div class="label">Analysis History</div><button class="icon-btn" onclick="closeHistoryModal()">✕</button></div><div id="historyContent"></div></div></div>
<script>
const QUICK=['TCS','RELIANCE','HDFCBANK','INFY','AAPL','NVDA','TSLA','BTC'];
const INDIAN=new Set(['TCS','RELIANCE','HDFCBANK','INFY','WIPRO','BHARTIARTL','ICICIBANK','AXISBANK','SBIN','KOTAKBANK','BAJFINANCE','HINDUNILVR','ITC','LT','MARUTI','TITAN','SUNPHARMA','DRREDDY','CIPLA','TECHM','HCLTECH','NESTLEIND','ULTRACEMCO','ADANIENT','ADANIPORTS','NTPC','POWERGRID','ONGC','COALINDIA','TATASTEEL','JSWSTEEL','HINDALCO','BPCL','BAJAJ-AUTO','EICHERMOT','APOLLOHOSP','ASIANPAINT','INOXINDIA']);
const US=new Set(['AAPL','MSFT','GOOGL','AMZN','NVDA','TSLA','META','NFLX','AMD','INTC','JPM','BAC','WMT']);
const MAP={btc:'BTC-USD',eth:'ETH-USD',bnb:'BNB-USD',sol:'SOL-USD',xrp:'XRP-USD',tcs:'TCS',reliance:'RELIANCE',hdfcbank:'HDFCBANK',infy:'INFY','inoxindia':'INOXINDIA','inox india':'INOXINDIA','natcopharma':'NATCOPHARM','natco pharma':'NATCOPHARM'};
const SECTOR={TCS:'IT',INFY:'IT',HCLTECH:'IT',TECHM:'IT',RELIANCE:'ENERGY',ONGC:'ENERGY',BPCL:'ENERGY',HDFCBANK:'BANKING',ICICIBANK:'BANKING',AXISBANK:'BANKING',SBIN:'BANKING',KOTAKBANK:'BANKING',AAPL:'TECH',MSFT:'TECH',NVDA:'TECH',TSLA:'AUTO'};
let state={current:null,ai:null,loading:false,statusTimer:null,subtab:'overview',analysisToken:0,analysisRunning:false};

function init(){document.getElementById('chips').innerHTML=QUICK.map(c=>`<button class="pill" onclick="pick('${c}')">${c}</button>`).join('');renderPortfolio();renderHistory();}
function openKeyModal(){document.getElementById('keyModal').classList.add('active');document.getElementById('keyInput').value=localStorage.getItem('openaiKey')||'';}
function closeKeyModal(){document.getElementById('keyModal').classList.remove('active');}
function saveKey(){localStorage.setItem('openaiKey',(document.getElementById('keyInput').value||'').replace(/\s+/g,''));closeKeyModal();}
function openHistoryModal(){renderHistory();document.getElementById('historyModal').classList.add('active');}
function closeHistoryModal(){document.getElementById('historyModal').classList.remove('active');}
function exportAnalysis(){if(!state.current)return;const payload={exportedAt:new Date().toISOString(),analysis:state.current,ai:state.ai||null};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`stocksage-${(state.current.symbol||'analysis').replace(/[^A-Z0-9._-]/ig,'_')}-${Date.now()}.json`;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),500);}
function switchTab(tab){document.getElementById('analyseScreen').classList.toggle('active',tab==='analyse');document.getElementById('portfolioScreen').classList.toggle('active',tab==='portfolio');document.getElementById('tabAnalyse').classList.toggle('active',tab==='analyse');document.getElementById('tabPortfolio').classList.toggle('active',tab==='portfolio');}
function pick(t){document.getElementById('tickerInput').value=t;startAnalysis();}
function normalizeInput(raw){const z=(raw||'').trim();if(!z)return '';const low=z.toLowerCase();if(MAP[low])return MAP[low];const compact=low.replace(/\s+/g,'');if(MAP[compact])return MAP[compact];return z.toUpperCase();}
function yahooCandidates(raw){const t=normalizeInput(raw);if(!t)return [];if(t.endsWith('.NS')||t.endsWith('.BO')||t.endsWith('-USD'))return [t];if(US.has(t))return [t];if(INDIAN.has(t))return [t+'.NS',t+'.BO',t];if(/^[A-Z]{2,12}$/.test(t))return [t+'.NS',t+'.BO',t];return [t];}
async function fetchWithTimeout(url,opt={},ms=7000){const c=new AbortController();const id=setTimeout(()=>c.abort(),ms);try{return await fetch(url,{...opt,signal:c.signal});}finally{clearTimeout(id);}}
async function fetchChart(symbol){const bases=['https://query2.finance.yahoo.com/v8/finance/chart/','https://query1.finance.yahoo.com/v8/finance/chart/'];const ranges=['6mo','1y'];const started=Date.now();const MAX_TOTAL_MS=45000;for(const b of bases){for(const r of ranges){if(Date.now()-started>MAX_TOTAL_MS)throw new Error('Request timeout. Try exact symbol (e.g. NATCOPHARM.NS).');const u=`${b}${symbol}?interval=1d&range=${r}&includePrePost=false`;const enc=encodeURIComponent(u);const urls=[u,`https://corsproxy.io/?${enc}`,`https://api.allorigins.win/raw?url=${enc}`,`https://api.allorigins.win/get?url=${enc}`];for(const x of urls){if(Date.now()-started>MAX_TOTAL_MS)throw new Error('Request timeout. Try exact symbol (e.g. NATCOPHARM.NS).');try{const res=await fetchWithTimeout(x,{},7000);if(!res.ok)continue;let txt=await res.text();if(x.includes('/get?url=')){const o=JSON.parse(txt);txt=o.contents||'';}const j=JSON.parse(txt);const r0=j?.chart?.result?.[0];if(r0)return r0;}catch(_){}}}}throw new Error('No Yahoo source responded quickly. Try exact ticker with .NS/.BO');}
function validCandles(r){const q=r.indicators.quote[0],ts=r.timestamp||[];const out=[];for(let i=0;i<ts.length;i++){const o=q.open[i],h=q.high[i],l=q.low[i],c=q.close[i],v=q.volume[i];if([o,h,l,c,v].every(n=>Number.isFinite(n)&&n>0))out.push({t:ts[i],o,h,l,c,v});}if(out.length<30)throw new Error('Not enough valid candles');return out;}
const sma=(a,p)=>a.slice(-p).reduce((x,y)=>x+y,0)/p;
function ema(data,p){if(data.length<p)return null;const k=2/(p+1);let e=data.slice(0,p).reduce((a,b)=>a+b,0)/p;for(let i=p;i<data.length;i++)e=data[i]*k+e*(1-k);return e;}
function rsi(cl,p=14){if(cl.length<=p)return 50;let g=0,l=0;for(let i=1;i<=p;i++){const d=cl[i]-cl[i-1];if(d>=0)g+=d;else l-=d;}let ag=g/p,al=l/p;for(let i=p+1;i<cl.length;i++){const d=cl[i]-cl[i-1],gg=Math.max(d,0),ll=Math.max(-d,0);ag=(ag*(p-1)+gg)/p;al=(al*(p-1)+ll)/p;}if(al===0)return 100;const rs=ag/al;return 100-(100/(1+rs));}
function macd(cl){const e12=[],e26=[];for(let i=12;i<=cl.length;i++)e12.push(ema(cl.slice(0,i),12));for(let i=26;i<=cl.length;i++)e26.push(ema(cl.slice(0,i),26));const n=Math.min(e12.length,e26.length);const m=[];for(let i=0;i<n;i++)m.push(e12[e12.length-n+i]-e26[e26.length-n+i]);const s=[];for(let i=9;i<=m.length;i++)s.push(ema(m.slice(0,i),9));const mac=m[m.length-1],sig=s[s.length-1]??0;return {macd:mac,signal:sig,hist:mac-sig};}
function bb(cl,p=20,d=2){const seg=cl.slice(-p),mid=sma(cl,p);const vr=seg.reduce((a,b)=>a+(b-mid)*(b-mid),0)/p;const sd=Math.sqrt(vr);return {mid,upper:mid+d*sd,lower:mid-d*sd};}
function atr(h,l,c,p=14){const tr=[];for(let i=1;i<c.length;i++)tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));return tr.slice(-p).reduce((a,b)=>a+b,0)/p;}
function stochastic(h,l,c,k=14){const ks=[];for(let i=k-1;i<c.length;i++){const hh=Math.max(...h.slice(i-k+1,i+1)),ll=Math.min(...l.slice(i-k+1,i+1));ks.push(((c[i]-ll)/(hh-ll||1))*100);}const K=ks[ks.length-1]||50,D=ks.slice(-3).reduce((a,b)=>a+b,0)/(Math.min(3,ks.length)||1);return {K,D};}
function calc(candles,meta,symbol){const c=candles.map(x=>x.c),h=candles.map(x=>x.h),l=candles.map(x=>x.l),v=candles.map(x=>x.v);const last=c[c.length-1],prev=c[c.length-2];const e20=ema(c,20),e50=ema(c,50),e200=ema(c,Math.min(200,c.length));const R=rsi(c),M=macd(c),B=bb(c),A=atr(h,l,c),S=stochastic(h,l,c);const pc=candles[candles.length-2];const p=(pc.h+pc.l+pc.c)/3,r1=2*p-pc.l,s1=2*p-pc.h,r2=p+(pc.h-pc.l),s2=p-(pc.h-pc.l);const vr=v[v.length-1]/sma(v,Math.min(20,v.length));const h52=Math.max(...c),l52=Math.min(...c),pos=((last-l52)/(h52-l52||1))*100;let score=0;if(last>e200)score+=10;if(last>e50)score+=8;if(last>e20)score+=7;if(R>=50&&R<65)score+=10;else if(R>=65&&R<75)score+=6;else if(R>=40&&R<50)score+=5;if(M.hist>0)score+=8;if(M.macd>M.signal)score+=7;if(vr>2)score+=15;else if(vr>1.5)score+=10;else if(vr>1)score+=5;if(e20>e50)score+=10;if(e50>e200)score+=10;if(pos>80)score+=15;else if(pos>60)score+=10;else if(pos>40)score+=6;score=Math.min(100,score);let verdict='HOLD';if(score>=65&&R<75&&last>e200)verdict='BUY';else if(score<=35||R>80||(last<e200&&score<50))verdict='SELL';const sl=last-2*A,resLevels=[r1,r2].filter(x=>x>last).sort((a,b)=>a-b),t1=resLevels[0]||last*1.08,t2=resLevels[1]||last*1.15;return {symbol,name:meta.longName||meta.shortName||symbol,exchange:meta.exchangeName||'N/A',currency:meta.currency||'USD',last,prev,chg:last-prev,pct:((last-prev)/prev)*100,e20,e50,e200,rsi:R,macd:M,bb:B,atr:A,stoch:S,pivot:{p,r1,s1,r2,s2},volRatio:vr,h52,l52,pos,score,verdict,sl,t1,t2,up:((t1-last)/last)*100,candles};}
function fmtCur(cur){if(cur==='INR')return 'Rs.';if(cur==='USD')return '$';return cur+' ';}
function setStatusCycle(){clearInterval(state.statusTimer);const arr=['FETCHING DATA...','CALCULATING INDICATORS...','RUNNING AI ANALYSIS...','SEARCHING WEB...'];let i=0;document.getElementById('status').textContent='⟳ '+arr[0];state.statusTimer=setInterval(()=>{i=(i+1)%arr.length;document.getElementById('status').textContent='⟳ '+arr[i];},1300);}function stopStatus(){clearInterval(state.statusTimer);document.getElementById('status').textContent='';}
async function startAnalysis(force){const q=(force||document.getElementById('tickerInput').value).trim();if(!q)return;if(state.analysisRunning)return;const token=Date.now();state.analysisToken=token;state.analysisRunning=true;document.getElementById('error').innerHTML='';setStatusCycle();try{const candidates=yahooCandidates(q);let parsed=null,symbolUsed='';for(const sym of candidates){if(state.analysisToken!==token)throw new Error('Cancelled');try{const res=await fetchChart(sym);const candles=validCandles(res);parsed={res,candles};symbolUsed=sym;break;}catch(_){}}if(!parsed)throw new Error('No Yahoo source responded for this symbol/name');if(state.analysisToken!==token)throw new Error('Cancelled');state.current=calc(parsed.candles,parsed.res.meta||{},symbolUsed);state.ai=null;renderHero();renderSubtabs();addHistory(state.current);stopStatus();runAI();updatePortfolioFromAnalysis();}catch(e){if(e.message!=='Cancelled'){stopStatus();document.getElementById('error').innerHTML=`<div class='error'>⚠ ${e.message}</div>`;}}finally{if(state.analysisToken===token){state.analysisRunning=false;stopStatus();}}}
function renderHero(){const d=state.current,cur=fmtCur(d.currency),vc=d.verdict==='BUY'?'g':d.verdict==='SELL'?'r':'y';const sc=Math.ceil(d.score/10);let seg='';for(let i=1;i<=10;i++){const c=d.score>=65?'g':d.score<=35?'r':'y';seg+=`<div class='seg ${i<=sc?'on '+c:''}'></div>`;}document.getElementById('heroWrap').innerHTML=`<div class='hero panel'><div class='label'>${d.symbol} • ${d.exchange}</div><h2>${d.name}</h2><div class='price'>${cur}${d.last.toFixed(2)}</div><div class='chg ${d.chg>=0?'pos':'neg'}'>${d.chg>=0?'+':''}${d.chg.toFixed(2)} (${d.pct.toFixed(2)}%)</div><div class='score'><div class='segs'>${seg}</div><div>${d.score}</div></div><div style='display:flex;justify-content:space-between;align-items:center'><span class='badge ${vc}'>${d.verdict}</span><span class='label'>LIVE TECH SCORE</span></div><canvas id='spark' width='430' height='80'></canvas></div>`;spark();}
function spark(){const c=document.getElementById('spark');if(!c||!state.current)return;const x=c.getContext('2d'),arr=state.current.candles.slice(-60).map(v=>v.c);const min=Math.min(...arr),max=Math.max(...arr);x.clearRect(0,0,c.width,c.height);x.beginPath();arr.forEach((v,i)=>{const px=i*(c.width/(arr.length-1));const py=(1-(v-min)/(max-min||1))*60+8;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);});x.lineWidth=2;x.strokeStyle=arr[arr.length-1]>=arr[0]?'#00e678':'#ff3250';x.stroke();x.lineTo(c.width,78);x.lineTo(0,78);x.closePath();const g=x.createLinearGradient(0,0,0,80);g.addColorStop(0,'rgba(0,230,120,.25)');g.addColorStop(1,'rgba(0,180,216,0)');x.fillStyle=g;x.fill();}
function renderSubtabs(){document.getElementById('tabsWrap').innerHTML=`<div class='tabs-sub'>${['overview','technical','targets','ai/news','fundamentals','setup'].map(t=>`<button class='${state.subtab===t?'active':''}' onclick="setSubtab('${t}')">${t==='setup'?'SETUP IQ':t.toUpperCase()}</button>`).join('')}</div><div id='subpane'></div>`;drawSubpane();}
function setSubtab(t){state.subtab=t;renderSubtabs();}
function signalBadgeText(v){if(v>80)return 'OVERBOUGHT';if(v<30)return 'OVERSOLD';return v>=50?'BUY':'SELL';}
function checklist(d){return [{k:'Trend above EMA200',ok:d.last>d.e200},{k:'EMA20 > EMA50',ok:d.e20>d.e50},{k:'EMA50 > EMA200',ok:d.e50>d.e200},{k:'Healthy RSI (45-70)',ok:d.rsi>=45&&d.rsi<=70},{k:'Positive MACD Hist',ok:d.macd.hist>0},{k:'Volume expansion',ok:d.volRatio>1.2}];}function fallbackFundamentals(d){const ret=d.pct,rr=Math.abs(d.t1-d.last)/Math.max(.0001,Math.abs(d.last-d.sl));return [{label:'P/E Ratio',value:(18+d.score/5).toFixed(1),score:Math.min(10,Math.max(1,Math.round(d.score/10))),color:d.score>60?'g':d.score<40?'r':'y',note:'Model-based proxy'},{label:'EPS Growth',value:(ret*1.8).toFixed(1)+'%',score:ret>2?8:ret<-2?3:6,color:ret>2?'g':ret<-2?'r':'y',note:'Price momentum proxy'},{label:'Revenue Growth',value:(ret*1.2).toFixed(1)+'%',score:ret>2?7:ret<-2?3:5,color:ret>2?'g':ret<-2?'r':'y',note:'Trend proxy'},{label:'EBITDA Margin',value:(12+d.score/8).toFixed(1)+'%',score:d.score>65?8:d.score<35?4:6,color:d.score>65?'g':d.score<35?'r':'y',note:'Score-derived proxy'},{label:'Debt/Equity',value:(1.2-(d.score/120)).toFixed(2),score:d.score>60?7:4,color:d.score>60?'g':'y',note:'Risk proxy'},{label:'ROE',value:(10+d.score/6).toFixed(1)+'%',score:d.score>60?8:5,color:d.score>60?'g':'y',note:'Efficiency proxy'},{label:'Promoter Holding',value:(45+Math.min(30,d.score/2)).toFixed(1)+'%',score:d.score>55?7:5,color:d.score>55?'g':'y',note:'Stability proxy'},{label:'Dividend Yield',value:(1+(d.score<35?1.2:0.5)).toFixed(2)+'%',score:6,color:'y',note:'Placeholder estimate'}];}
function fallbackInstitutional(d){const s=d.score;return [{label:'FII/FPI Net',value:(s>60?'+':'')+((s-50)*2).toFixed(0)+' Cr',trend:s>55?'↑':'↓'},{label:'DII Net',value:(s<45?'+':'')+((55-s)*1.5).toFixed(0)+' Cr',trend:s<45?'↑':'→'},{label:'Promoter Stake',value:(48+s/3).toFixed(1)+'%',trend:s>50?'↑':'→'},{label:'PCR',value:(0.7+(100-s)/200).toFixed(2),trend:s>55?'↑':'↓'}];}
function fallbackConsensus(d){return {avgTarget:d.t1.toFixed(2),upside:d.up.toFixed(2)+'%',numAnalysts:Math.max(8,Math.round(d.score/5))};}function confluenceSignals(d){const cl=d.candles.map(x=>x.c),hh20=Math.max(...cl.slice(-20)),ll20=Math.min(...cl.slice(-20));const bw=((d.bb.upper-d.bb.lower)/(d.bb.mid||1))*100;const pull20=Math.abs((d.last-d.e20)/(d.e20||1))*100;const setups=[{name:'Trend Template',ok:d.last>d.e50&&d.e50>d.e200,desc:'Price above EMA50 and EMA50 above EMA200'},{name:'20D Breakout',ok:d.last>=hh20*0.995,desc:'Price near/above 20-day high'},{name:'Pullback-to-EMA20',ok:pull20<=1.2&&d.last>d.e50,desc:'Constructive pullback to EMA20'},{name:'Momentum Confirmation',ok:d.macd.hist>0&&d.rsi>50,desc:'RSI>50 and MACD histogram positive'},{name:'Volume Confirmation',ok:d.volRatio>1.2,desc:'Volume ratio above 1.2x'},{name:'Low Vol Squeeze',ok:bw<10,desc:'Bollinger width compressed'}];const pass=setups.filter(x=>x.ok).length;const grade=pass>=5?'A+':pass>=4?'A':pass>=3?'B':pass>=2?'C':'D';const flags=[];if(d.rsi>78)flags.push('Overbought risk');if(d.last<d.e200)flags.push('Below long-term trend');if(d.volRatio<0.9)flags.push('Weak participation');if(((d.last-d.sl)/d.last)*100<3)flags.push('Tight stop distance');return {setups,pass,grade,flags,bw:bw.toFixed(2),pull20:pull20.toFixed(2),hh20,ll20};}
function drawSubpane(){const d=state.current;if(!d)return;const cur=fmtCur(d.currency),ai=state.ai,loading=state.loading;let html='';if(state.subtab==='overview'){const c=checklist(d);html=`<div class='subpane active'><div class='grid'><div><div class='label'>Open</div>${cur}${d.candles.at(-1).o.toFixed(2)}</div><div><div class='label'>High</div>${cur}${d.candles.at(-1).h.toFixed(2)}</div><div><div class='label'>Low</div>${cur}${d.candles.at(-1).l.toFixed(2)}</div><div><div class='label'>Prev Close</div>${cur}${d.prev.toFixed(2)}</div><div><div class='label'>52W High</div>${cur}${d.h52.toFixed(2)}</div><div><div class='label'>52W Low</div>${cur}${d.l52.toFixed(2)}</div><div><div class='label'>Volume</div>${Math.round(d.candles.at(-1).v).toLocaleString()}</div><div><div class='label'>Vol Ratio</div>${d.volRatio.toFixed(2)}x</div></div><div class='row' style='grid-template-columns:1fr;'><div class='label'>52W POSITION ${d.pos.toFixed(1)}%</div><div class='range'><div class='fill' style='width:100%'></div><div class='pin' style='left:${Math.max(0,Math.min(100,d.pos))}%'></div></div></div><div class='row' style='grid-template-columns:1fr'>${c.map(i=>`<div style='display:flex;justify-content:space-between;margin-bottom:5px'><span>${i.k}</span><span class='badge ${i.ok?'g':'r'}'>${i.ok?'PASS':'FAIL'}</span></div>`).join('')}</div><div class='row' style='grid-template-columns:1fr'>${loading?'<div class="label">⟳ FETCHING AI ANALYSIS...</div>':`<div>${ai?.thesis||''}</div><div class='label' style='margin-top:6px'>${ai?.sector_outlook||''}</div><div style='margin-top:8px;display:flex;gap:6px'><span class='badge b'>${ai?.confidence||'N/A'}</span><span class='badge y'>${ai?.timeframe||'N/A'}</span></div>`}</div></div>`;}
if(state.subtab==='technical'){const rows=[['RSI',d.rsi.toFixed(2),signalBadgeText(d.rsi)],['MACD Hist',d.macd.hist.toFixed(4),d.macd.hist>0?'BUY':'SELL'],['EMA20',d.e20.toFixed(2),d.last>d.e20?'BUY':'SELL'],['EMA50',d.e50.toFixed(2),d.last>d.e50?'BUY':'SELL'],['EMA200',d.e200.toFixed(2),d.last>d.e200?'BUY':'SELL'],['BB Position',((d.last-d.bb.lower)/(d.bb.upper-d.bb.lower||1)*100).toFixed(1)+'%','NEUTRAL'],['Stoch K',d.stoch.K.toFixed(1),d.stoch.K>80?'OVERBOUGHT':d.stoch.K<20?'OVERSOLD':'NEUTRAL'],['ATR',d.atr.toFixed(2),'NEUTRAL'],['Support',d.pivot.s1.toFixed(2),d.last<d.pivot.s1?'SELL':'NEUTRAL'],['Resistance',d.pivot.r1.toFixed(2),d.last>d.pivot.r1?'BUY':'NEUTRAL']];html=`<div class='subpane active'>${rows.map(r=>`<div class='row'><div>${r[0]}</div><div>${r[1]}</div><span class='badge ${/BUY|BULL|OVERSOLD/.test(r[2])?'g':/SELL|BEAR|OVERBOUGHT/.test(r[2])?'r':'y'}'>${r[2]}</span></div>`).join('')}${ai?.chartPatterns?.map(p=>`<div class='row' style='grid-template-columns:1fr'><div>${p.icon||'📈'} ${p.name} • ${p.desc||''}</div></div>`).join('')||''}</div>`;}
if(state.subtab==='targets'){const rr=Math.abs(d.t1-d.last)/Math.max(.0001,Math.abs(d.last-d.sl));html=`<div class='subpane active'><div class='risk'><div class='label'>Target 1</div><div class='price' style='font-size:22px;color:var(--g)'>${cur}${d.t1.toFixed(2)} (+${d.up.toFixed(2)}%)</div></div><div class='risk'><div class='label'>Target 2</div><div class='price' style='font-size:22px;color:var(--b)'>${cur}${d.t2.toFixed(2)}</div></div><div class='risk'><div class='label'>Stop Loss</div><div class='price' style='font-size:22px;color:var(--r)'>${cur}${d.sl.toFixed(2)} (${(((d.sl-d.last)/d.last)*100).toFixed(2)}%)</div></div><div class='row' style='grid-template-columns:1fr'>Risk/Reward ${rr.toFixed(2)}:1</div><div class='row' style='grid-template-columns:1fr'>${ai?.sectorPeersContext||'AI sector context pending...'}</div></div>`;}
if(state.subtab==='ai/news'){html=`<div class='subpane active'>${loading?'<div class="row" style="grid-template-columns:1fr">⟳ FETCHING AI ANALYSIS...</div>':''}${(ai?.news||[]).map(n=>`<div class='news'><div>${n.title||''}</div><div style='display:flex;gap:6px;margin-top:6px'><span class='badge ${n.sentiment==='BULL'?'g':n.sentiment==='BEAR'?'r':'y'}'>${n.sentiment||'NEUT'}</span><span class='label'>${n.source||''} • ${n.date||''}</span></div><div class='label' style='margin-top:6px'>${n.impact||''}</div></div>`).join('')}<div class='risk'><div style='color:var(--g)'>▲ ${(ai?.catalysts?.bullish||[]).join(' • ')}</div><div style='color:var(--r);margin-top:6px'>▼ ${(ai?.catalysts?.bearish||[]).join(' • ')}</div><div style='color:var(--y);margin-top:6px'>⚠ ${(ai?.keyRisks||[]).join(' • ')}</div><div class='label' style='margin-top:6px'>RISK LEVEL: ${ai?.riskLevel??'N/A'}/10</div></div></div>`;}
if(state.subtab==='fundamentals'){const fset=(ai?.fundamentals&&ai.fundamentals.length?ai.fundamentals:fallbackFundamentals(d));const inst=(ai?.institutional&&ai.institutional.length?ai.institutional:fallbackInstitutional(d));const cns=ai?.analystConsensus||fallbackConsensus(d);html=`<div class='subpane active'>${loading?'<div class="row" style="grid-template-columns:1fr">⟳ FETCHING AI ANALYSIS...</div>':''}${fset.map(f=>`<div class='metric'><div style='display:flex;justify-content:space-between'><span>${f.label}</span><span>${f.value}</span></div><div class='range' style='margin-top:6px'><div class='fill' style='width:${(f.score||0)*10}%;background:${f.color==='g'?'var(--g)':f.color==='r'?'var(--r)':'var(--y)'}'></div></div><div class='label' style='margin-top:6px'>${f.note||''}</div></div>`).join('')}<div class='inst-row'>${inst.map(i=>`<div style='display:flex;justify-content:space-between;margin-bottom:5px'><span>${i.label}</span><span>${i.value} ${i.trend||''}</span></div>`).join('')}</div><div class='inst-row'>Target: ${cns.avgTarget||'N/A'} | Upside: ${cns.upside||'N/A'} | Analysts: ${cns.numAnalysts||'N/A'}</div></div>`;}if(state.subtab==='setup'){const sc=confluenceSignals(d);html=`<div class='subpane active'><div class='risk'><div class='label'>Confluence Grade</div><div style='display:flex;justify-content:space-between;align-items:center'><div class='price' style='font-size:26px'>${sc.grade}</div><span class='badge ${sc.pass>=4?'g':sc.pass>=2?'y':'r'}'>${sc.pass}/6 PASS</span></div><div class='label' style='margin-top:6px'>BB WIDTH ${sc.bw}% • PULLBACK TO EMA20 ${sc.pull20}%</div></div>${sc.setups.map(x=>`<div class='row'><div>${x.name}</div><div class='label'>${x.desc}</div><span class='badge ${x.ok?'g':'r'}'>${x.ok?'PASS':'FAIL'}</span></div>`).join('')}<div class='risk'><div class='label'>Risk Flags</div>${(sc.flags.length?sc.flags:['No major risk flags']).map(f=>`<div style='margin-top:6px'>• ${f}</div>`).join('')}</div></div>`;}document.getElementById('subpane').innerHTML=html;}
async function runAI(){const key=localStorage.getItem('openaiKey');if(!key||!state.current)return;state.loading=true;drawSubpane();const d=state.current;const base=d.symbol.replace('.NS','').replace('.BO','');const sector=SECTOR[base]||'GENERAL';const peerHint=Object.keys(SECTOR).filter(k=>SECTOR[k]===sector&&k!==base).slice(0,6).join(', ');
const jsonSpec=`{ "news": [{"title":"","sentiment":"BULL|BEAR|NEUT","source":"","date":"","impact":""}], "catalysts":{"bullish":["",""],"bearish":["",""]}, "thesis":"", "confidence":"HIGH|MEDIUM|LOW", "time_horizon":"SHORT|MEDIUM|LONG", "timeframe":"", "sector_outlook":"", "fundamental_snapshot":"", "fundamentals":[{"label":"P/E Ratio","value":"","score":0,"color":"g|r|y","note":""}], "institutional":[{"label":"FII/FPI Net","value":"","trend":""}], "chartPatterns":[{"name":"","icon":"","signal":"BULL|BEAR","reliability":"","desc":"","targetPrice":""}], "riskLevel":1, "keyRisks":["",""], "analystConsensus":{"avgTarget":"","upside":"","numAnalysts":0}, "sectorPeersContext":"" }`;
const scx=confluenceSignals(d);const prompt=`You are building a high-conviction stock memo. Collect latest data for ${d.name} (${d.symbol}). Must analyze: trend, indicator setup, fundamental quality, quarterly result momentum, valuation sanity, balance sheet stress, institutional flow (FII/DII), analyst revisions, company-specific news, sector news, and peer comparison vs ${peerHint||'major peers'}. Technical context: Price ${d.last.toFixed(2)}, Score ${d.score}, Verdict ${d.verdict}, RSI ${d.rsi.toFixed(2)}, MACD Hist ${d.macd.hist.toFixed(4)}, VolRatio ${d.volRatio.toFixed(2)}, 52WPos ${d.pos.toFixed(2)}, EMA20/50/200 ${d.e20.toFixed(2)}/${d.e50.toFixed(2)}/${d.e200.toFixed(2)}, SL ${d.sl.toFixed(2)}, T1 ${d.t1.toFixed(2)}. Confluence context: Grade ${scx.grade}, Pass ${scx.pass}/6, Bollinger Width ${scx.bw}%, Pullback ${scx.pull20}%. Return only strict JSON matching schema: ${jsonSpec}`;
try{const res=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-4o-mini',temperature:0.2,response_format:{type:'json_object'},messages:[{role:'system',content:'You are an expert stock analyst. Use recent publicly available information and return strict JSON only.'},{role:'user',content:prompt}]})});if(!res.ok)throw new Error('AI unavailable');const j=await res.json();const txt=j?.choices?.[0]?.message?.content||'';let parsed=null;try{parsed=JSON.parse(txt);}catch{const s=txt.indexOf('{'),e=txt.lastIndexOf('}');if(s>=0&&e>s)parsed=JSON.parse(txt.slice(s,e+1));}if(parsed){state.ai=parsed;updateHistoryAI(d.symbol,parsed);} }catch(_){ }finally{state.loading=false;drawSubpane();renderPortfolio();}}
function getHistory(){try{return JSON.parse(localStorage.getItem('analysisHistory')||'[]');}catch{return [];}}
function saveHistory(arr){localStorage.setItem('analysisHistory',JSON.stringify(arr));}
function histKey(sym){return (sym||'').toUpperCase();}
function addHistory(d,aiData=null){const arr=getHistory().filter(x=>histKey(x.symbol)!==histKey(d.symbol));arr.unshift({ts:Date.now(),symbol:d.symbol,name:d.name,price:d.last,score:d.score,verdict:d.verdict,pct:d.pct,analysis:d,ai:aiData});saveHistory(arr.slice(0,40));renderHistory();}
function updateHistoryAI(symbol,aiData){if(!aiData)return;const arr=getHistory();const i=arr.findIndex(x=>histKey(x.symbol)===histKey(symbol));if(i>=0){arr[i].ai=aiData;saveHistory(arr);}}
function renderHistory(){const h=getHistory();document.getElementById('historyContent').innerHTML=h.map((x,i)=>`<div class='history-item' onclick="loadFromHistory(${i})"><div class='top'><div><div>${x.symbol}</div><div class='label'>${new Date(x.ts).toLocaleString()}</div></div><div><span class='badge ${x.verdict==='BUY'?'g':x.verdict==='SELL'?'r':'y'}'>${x.verdict}</span></div></div><div class='label' style='margin-top:6px'>${x.name} • PRICE ${x.price.toFixed(2)} • SCORE ${x.score} • ${x.pct>=0?'+':''}${x.pct.toFixed(2)}%</div></div>`).join('')||"<div class='label' style='margin-top:8px'>NO HISTORY YET</div>";}
function clearHistory(){saveHistory([]);renderHistory();}
function loadFromHistory(idx){const h=getHistory();const x=h[idx];if(!x)return;closeHistoryModal();switchTab('analyse');document.getElementById('tickerInput').value=x.symbol;if(x.analysis){state.current=x.analysis;state.ai=x.ai||null;renderHero();renderSubtabs();}else{startAnalysis(x.symbol);}}
function getPortfolio(){try{return JSON.parse(localStorage.getItem('portfolio')||'[]');}catch{return [];}}
function savePortfolio(arr){localStorage.setItem('portfolio',JSON.stringify(arr));}
function addPosition(){const t=document.getElementById('pTicker').value.trim().toUpperCase(),q=+document.getElementById('pQty').value,b=+document.getElementById('pBuy').value,d=document.getElementById('pDate').value||new Date().toISOString().slice(0,10);if(!t||!q||!b)return;const p=getPortfolio();p.push({ticker:t,qty:q,buy:b,date:d,last:null,verdict:null});savePortfolio(p);renderPortfolio();}
function signalFromPnL(pct,verdict){if(pct>=30&&verdict==='BUY')return ['HOLD STRONG','g'];if(pct>=30&&verdict==='SELL')return ['BOOK PROFIT','g'];if(pct>=15&&verdict==='SELL')return ['PARTIAL EXIT','y'];if(pct>=5&&verdict==='BUY')return ['HOLD','b'];if(pct>=0&&verdict==='SELL')return ['EXIT','y'];if(pct>=-8&&verdict==='BUY')return ['DCA','y'];if(pct>=-20&&verdict==='BUY')return ['DCA ↓','y'];if(pct>=-20&&verdict==='SELL')return ['REVIEW','y'];if(pct<-20)return ['CUT LOSS ⚠','r'];return ['ANALYSE','y'];}
function updatePortfolioFromAnalysis(){if(!state.current)return;const p=getPortfolio();const sym=state.current.symbol.replace('.NS','').replace('.BO','');p.forEach(x=>{if(x.ticker.toUpperCase()===sym||yahooCandidates(x.ticker).includes(state.current.symbol)){x.last=state.current.last;x.verdict=state.current.verdict;}});savePortfolio(p);renderPortfolio();}
function delPos(i){const p=getPortfolio();p.splice(i,1);savePortfolio(p);renderPortfolio();}
function analyseLive(t){switchTab('analyse');document.getElementById('tickerInput').value=t;startAnalysis(t);}
function renderPortfolio(){const p=getPortfolio();document.getElementById('portfolioList').innerHTML=p.map((x,i)=>{const pnl=x.last?((x.last-x.buy)/x.buy*100):null;const [txt,col]=signalFromPnL(pnl??-999,x.verdict);return `<div class='position'><div style='display:flex;justify-content:space-between'><div><div>${x.ticker}</div><div class='label'>QTY ${x.qty} • BUY ${x.buy} • ${x.date}</div></div><button class='icon-btn' onclick='delPos(${i})'>✕</button></div><div style='margin-top:8px'>${x.last?`P&L: ${pnl.toFixed(2)}%`:'NO ANALYSIS YET'}</div><div style='margin-top:8px;display:flex;gap:6px'><span class='badge ${col}'>${x.last?txt:'ANALYSE'}</span><button class='icon-btn' onclick="analyseLive('${x.ticker}')">ANALYSE LIVE</button></div></div>`;}).join('')||"<div class='label'>NO POSITIONS ADDED</div>";}
init();
</script>
